kind = "web"
previewPath = "/"
title = "Ayla Insights — Marketing Site"
version = "1.0.0"
id = "artifacts/ayla-marketing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21833

[services.development]
run = "pnpm --filter @workspace/ayla-marketing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ayla-marketing", "run", "build" ]
publicDir = "artifacts/ayla-marketing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21833"
BASE_PATH = "/"
