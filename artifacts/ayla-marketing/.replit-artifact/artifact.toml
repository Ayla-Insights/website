kind = "web"
previewPath = "/"
title = "Mandi — Marketing Site"
version = "1.0.0"
id = "artifacts/ayla-marketing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21833

[services.development]
run = "pnpm --filter @workspace/ayla-marketing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ayla-marketing", "run", "build" ]
publicDir = "artifacts/ayla-marketing/dist/public"
serve = "static"

# Serve the prerendered static HTML for each known route. Replit "shadows"
# rewrites with real files, so direct hits to the .html files serve them too;
# these clean-URL rewrites map the extensionless paths to their files.
# Keep this list in sync with `routes` in src/entry-server.tsx.
[[services.production.rewrites]]
from = "/features"
to = "/features.html"

[[services.production.rewrites]]
from = "/dentrix"
to = "/dentrix.html"

[[services.production.rewrites]]
from = "/security"
to = "/security.html"

[[services.production.rewrites]]
from = "/pricing"
to = "/pricing.html"

[[services.production.rewrites]]
from = "/about"
to = "/about.html"

[[services.production.rewrites]]
from = "/demo"
to = "/demo.html"

[[services.production.rewrites]]
from = "/legal/privacy"
to = "/legal/privacy.html"

[[services.production.rewrites]]
from = "/legal/terms"
to = "/legal/terms.html"

[[services.production.rewrites]]
from = "/resources"
to = "/resources.html"

[[services.production.rewrites]]
from = "/resources/*"
to = "/resources/*.html"

# Per-PMS integration landing pages (keep in sync with integrations in src/data/pms.ts).
[[services.production.rewrites]]
from = "/opendental"
to = "/opendental.html"

[[services.production.rewrites]]
from = "/eaglesoft"
to = "/eaglesoft.html"

[[services.production.rewrites]]
from = "/dentrix-ascend"
to = "/dentrix-ascend.html"

[[services.production.rewrites]]
from = "/denticon"
to = "/denticon.html"

[[services.production.rewrites]]
from = "/curve"
to = "/curve.html"

# Legacy URLs (old aylainsights.com paths). Replit static can't issue real 301s,
# so serve the renamed page's prerendered HTML — whose <link rel="canonical">
# points at the new URL, consolidating SEO equity. The client (wouter <Redirect>)
# still updates the address bar to the new path for human visitors. True 301s for
# the apex/domain change belong at the DNS layer.
[[services.production.rewrites]]
from = "/product"
to = "/features.html"

[[services.production.rewrites]]
from = "/book"
to = "/demo.html"

[[services.production.rewrites]]
from = "/blog"
to = "/resources.html"

[[services.production.rewrites]]
from = "/blog/*"
to = "/resources/*.html"

# Catch-all SPA fallback: any path without a prerendered file (client-only
# routes, unknown slugs, 404s) loads the shell and wouter renders it.
[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21833"
BASE_PATH = "/"
