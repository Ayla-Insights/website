<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Ayla Insights | AI Front Office for Dental Practices</title>
    <meta name="description" content="See the revenue hiding in your Dentrix data. Ayla helps your dental front desk fill the schedule, recover unscheduled treatment, and grow." />
    <meta name="robots" content="index, follow" />

    <!-- Prevent preview/staging domains from being indexed -->
    <script>
      (function() {
        var host = window.location.hostname;
        if (host.endsWith('.replit.app') || host.endsWith('.replit.dev') || host.endsWith('.repl.co')) {
          var meta = document.createElement('meta');
          meta.name = 'robots';
          meta.content = 'noindex, nofollow';
          document.head.appendChild(meta);
        }
      })();
    </script>

    <!-- Open Graph -->
    <meta property="og:title" content="Ayla Insights | AI Front Office for Dental Practices" />
    <meta property="og:description" content="See the revenue hiding in your Dentrix data. Ayla helps your dental front desk fill the schedule, recover unscheduled treatment, and grow." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aylainsights.com" />
    <meta property="og:image" content="https://aylainsights.com/opengraph.jpg" />
    <meta property="og:site_name" content="Ayla Insights" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ayla Insights | AI Front Office for Dental Practices" />
    <meta name="twitter:description" content="See the revenue hiding in your Dentrix data. Ayla helps your dental front desk fill the schedule, recover unscheduled treatment, and grow." />
    <meta name="twitter:image" content="https://aylainsights.com/opengraph.jpg" />

    <link rel="icon" type="image/png" href="/logo-mark.png" />
    <link rel="canonical" href="https://aylainsights.com" />

    <!-- Organization + WebSite structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Ayla Insights",
        "url": "https://aylainsights.com",
        "logo": "https://aylainsights.com/logo-mark.png",
        "description": "AI front-office copilot for dental practices that finds unscheduled treatment, schedule gaps, and lapsed recall.",
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "hello@aylainsights.com",
          "contactType": "sales"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Ayla Insights",
        "url": "https://aylainsights.com"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
